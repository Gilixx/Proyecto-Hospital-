<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-2xl shadow-xl overflow-hidden animate-fade-in">
        <div class="px-8 pt-10 pb-8">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Bienvenido</h1>
            <p class="text-sm text-center text-gray-500 mb-8">Inicia sesión para acceder a tu portal</p>

            <div th:if="${param.error}" class="bg-red-50 text-red-600 p-4 rounded-lg text-sm mb-6 border border-red-200">
                Credenciales inválidas. Por favor, intenta de nuevo.
            </div>

            <div th:if="${param.logout}" class="bg-green-50 text-green-600 p-4 rounded-lg text-sm mb-6 border border-green-200">
                Has cerrado sesión exitosamente.
            </div>

            <form th:action="@{/login_check}" method="post" class="space-y-6">
                
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="username" name="username" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors shadow-sm text-gray-700"
                           placeholder="usuario@ejemplo.com">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    </div>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors shadow-sm text-gray-700"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                           class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                        Recordarme
                    </label>
                </div>

                <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Iniciar Sesión
                </button>
            </form>
        </div>
        <div class="px-8 py-5 bg-gray-50 border-t border-gray-100 flex justify-center">
            <p class="text-sm text-gray-600">
                ¿No tienes cuenta? <a href="#" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">Contacta a recepción</a>
            </p>
        </div>
    </div>

</body>
</html>
