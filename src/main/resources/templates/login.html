<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <style>
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Decorative Blobs -->
    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>

    <div class="glass-card w-full max-w-[440px] rounded-[2rem] shadow-2xl overflow-hidden animate-fade-in">
        <div class="px-10 pt-12 pb-10">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-sky-400 rounded-2xl rotate-12 flex items-center justify-center shadow-lg shadow-blue-200">
                    <svg class="w-10 h-10 text-white -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                </div>
            </div>

            <h1 class="text-4xl font-bold text-center text-slate-900 mb-3 tracking-tight">Bienvenido</h1>
            <p class="text-base text-center text-slate-500 mb-10 leading-relaxed">Accede a tu portal hospitalario con tus credenciales seguras.</p>

            <div th:if="${param.error}" class="bg-red-50/80 backdrop-blur-md text-red-600 p-4 rounded-2xl text-sm mb-8 border border-red-100 flex items-center gap-3">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span>Credenciales incorrectas.</span>
            </div>

            <div th:if="${param.logout}" class="bg-blue-50/80 backdrop-blur-md text-blue-600 p-4 rounded-2xl text-sm mb-8 border border-blue-100 flex items-center gap-3">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <span>Sesión cerrada correctamente.</span>
            </div>

            <form th:action="@{/login_check}" method="post" class="space-y-6">
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-semibold text-slate-700 ml-1">Correo Electrónico</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path></svg>
                        </div>
                        <input type="email" id="username" name="username" required
                               class="w-full pl-11 pr-4 py-4 rounded-2xl bg-white/50 border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all text-slate-700 placeholder:text-slate-400"
                               placeholder="tu@email.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="password" class="block text-sm font-semibold text-slate-700 ml-1">Contraseña</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" id="password" name="password" required
                               class="w-full pl-11 pr-4 py-4 rounded-2xl bg-white/50 border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all text-slate-700 placeholder:text-slate-400"
                               placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between pb-2">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                               class="h-5 w-5 text-blue-600 focus:ring-blue-100 border-slate-300 rounded-lg transition-all cursor-pointer">
                        <label for="remember-me" class="ml-3 block text-sm font-medium text-slate-600 cursor-pointer">
                            Recordarme
                        </label>
                    </div>
                    <a href="#" class="text-sm font-semibold text-blue-600 hover:text-blue-700 transition-colors">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit"
                        class="w-full py-4 px-6 btn-premium rounded-2xl text-lg font-bold tracking-wide transition-all active:scale-[0.98]">
                    Entrar al Sistema
                </button>
            </form>
        </div>
        <div class="px-10 py-7 bg-slate-50/50 border-t border-slate-100 flex justify-center backdrop-blur-sm">
            <p class="text-sm font-medium text-slate-600">
                ¿Nuevo aquí? <a href="#" class="font-bold text-blue-600 hover:text-blue-700 transition-colors">Contactar Soporte</a>
            </p>
        </div>
    </div>

</body>
</html>
