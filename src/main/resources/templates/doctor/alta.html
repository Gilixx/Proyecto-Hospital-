<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Doctores - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-16 animate-fade-in">

    <div class="glass-card w-full max-w-4xl rounded-[3rem] shadow-2xl overflow-hidden border-white/60">
        <div class="px-10 pt-12 pb-10">
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl flex items-center justify-center mb-6 shadow-xl shadow-blue-200">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Registro de Médicos</h1>
                <p class="text-slate-500 mt-2 font-medium">Crea un nuevo perfil profesional en el sistema.</p>
            </div>

            <div th:if="${errorGlobal}" class="bg-rose-50/80 backdrop-blur-md text-rose-600 p-5 rounded-3xl text-sm mb-10 border border-rose-100 flex items-center gap-4 shadow-sm" th:text="${errorGlobal}">
                Error general
            </div>

            <form th:action="@{/doctor/registro}" th:object="${doctorRegistrationDTO}" method="post" class="space-y-10">
                
                <div class="space-y-8">
                    <!-- Sección: Datos Personales -->
                    <div class="bg-white/30 p-8 rounded-[2rem] border border-white/40 shadow-inner">
                        <h2 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-sm">01</span>
                            Datos Personales y Cuenta
                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label for="nombre" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Nombre(s) *</label>
                                <input type="text" id="nombre" th:field="*{nombre}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. Juan Carlos">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="apellidos" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Apellidos *</label>
                                <input type="text" id="apellidos" th:field="*{apellidos}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. Pérez García">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="email" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Email Profesional *</label>
                                <input type="email" id="email" th:field="*{email}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="dr.perez@hospital.com">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="password" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Contraseña de Acceso *</label>
                                <input type="password" id="password" th:field="*{password}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="••••••••">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="telefono" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Teléfono de Contacto</label>
                                <input type="text" id="telefono" th:field="*{telefono}"
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. 555-0123-456">
                            </div>

                            <div class="space-y-2">
                                <label for="fechaNacimiento" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Fecha de Nacimiento</label>
                                <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}"
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700">
                            </div>
                        </div>
                    </div>

                    <!-- Sección: Datos Profesionales -->
                    <div class="bg-white/30 p-8 rounded-[2rem] border border-white/40 shadow-inner">
                        <h2 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-3">
                            <span class="w-8 h-8 bg-sky-100 text-sky-600 rounded-xl flex items-center justify-center text-sm">02</span>
                            Información Especializada
                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label for="idEspecialidad" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Especialidad Médica *</label>
                                <select id="idEspecialidad" th:field="*{idEspecialidad}" required
                                        class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 appearance-none">
                                    <option value="" disabled selected>Seleccione Especialidad...</option>
                                    <option th:each="esp : ${especialidades}" th:value="${esp.idEspecialidad}" th:text="${esp.nombre}"></option>
                                </select>
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('idEspecialidad')}" th:errors="*{idEspecialidad}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="cedulaProfesional" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Cédula Profesional *</label>
                                <input type="text" id="cedulaProfesional" th:field="*{cedulaProfesional}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. CP-1234567">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('cedulaProfesional')}" th:errors="*{cedulaProfesional}"></p>
                            </div>

                            <div class="space-y-2">
                                <label for="consultorio" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Consultorio / Consultorio Virtual</label>
                                <input type="text" id="consultorio" th:field="*{consultorio}"
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. Consultorio 3B, Ala Norte">
                            </div>

                            <div class="space-y-2">
                                <label for="costoConsulta" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Costo de Consulta (MXN) *</label>
                                <input type="number" step="0.01" id="costoConsulta" th:field="*{costoConsulta}" required
                                       class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700 placeholder:text-slate-400"
                                       placeholder="Ej. 800.00">
                                <p class="text-rose-500 text-xs font-bold mt-1 ml-1" th:if="${#fields.hasErrors('costoConsulta')}" th:errors="*{costoConsulta}"></p>
                            </div>

                            <div class="col-span-1 md:col-span-2 space-y-2">
                                <label for="bio" class="block text-sm font-black text-slate-700 ml-1 uppercase tracking-wider">Biografía / Perfil Profesional</label>
                                <textarea id="bio" th:field="*{bio}" rows="5"
                                          class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-medium text-slate-700 placeholder:text-slate-400"
                                          placeholder="Resumen de trayectoria profesional, formación académica y enfoques médicos..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-8 flex flex-col md:flex-row justify-between gap-4">
                    <a href="/admin/dashboard" class="px-10 py-4 bg-white border border-slate-200 text-slate-600 rounded-[1.5rem] font-black uppercase tracking-widest text-center hover:bg-slate-50 active:scale-95 transition-all">
                        Regresar
                    </a>
                    <button type="submit"
                            class="px-12 py-4 btn-premium rounded-[1.5rem] text-lg font-black uppercase tracking-widest shadow-xl shadow-blue-200 active:scale-95 transition-all">
                        Completar Registro
                    </button>
                </div>
            </form>
        </div>
        <div class="px-10 py-8 bg-slate-50/50 border-t border-slate-100 flex justify-center backdrop-blur-sm">
            <p class="text-sm font-bold text-slate-500 uppercase tracking-wider">
                Sistema de Gestión Hospitalaria <span class="text-blue-500 mx-2">●</span> v2.0
            </p>
        </div>
    </div>

</body>
</html>
