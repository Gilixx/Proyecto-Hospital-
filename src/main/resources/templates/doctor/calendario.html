<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Médico - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fc-toolbar-title { font-weight: 600 !important; color: #1e293b; }
        .fc-button-primary {
            background-color: #2563eb !important; border-color: #2563eb !important;
            text-transform: capitalize; border-radius: 6px !important;
        }
        .fc-button-primary:hover { background-color: #1d4ed8 !important; }
        .fc-event { border: none; border-radius: 4px; padding: 2px 4px; font-size: 0.85rem;}
        #calendar-container {
            background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 20px;
        }
    </style>
</head>
<body class="p-6 h-screen flex flex-col">
    
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Mi Agenda</h1>
            <p class="text-gray-500">Visualiza y administra tus citas programadas.</p>
        </div>
        <a href="/logout" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg font-medium hover:bg-red-100 transition-colors">Cerrar Sesión</a>
    </header>

    <div class="flex-grow flex flex-col">
        <div id="calendar-container" class="flex-grow min-h-0 relative">
            <div id='calendar' class="h-full"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                locale: 'es',
                slotMinTime: '06:00:00',
                slotMaxTime: '22:00:00',
                allDaySlot: false,
                events: '/api/citas/mis-citas',
                eventColor: '#3b82f6',
                eventClick: function(info) {
                    alert('Cita: ' + info.event.title);
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
