<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
</head>
<body class="p-6 md:p-10 animate-fade-in">
    
    <header class="flex flex-col md:flex-row justify-between items-center mb-12 max-w-5xl mx-auto gap-6 bg-white/40 backdrop-blur-md p-8 rounded-[2.5rem] border border-white/60 shadow-xl shadow-blue-900/5">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Reserva tu Salud</h1>
            <p class="text-slate-500 font-medium mt-2">Encuentra al especialista ideal para ti.</p>
        </div>
        <a href="/logout" class="px-6 py-3 bg-white border border-red-100 text-red-600 rounded-2xl font-bold hover:bg-red-50 transition-all shadow-sm active:scale-95 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Salir
        </a>
    </header>

    <main class="max-w-5xl mx-auto">
        <!-- Messages -->
        <div th:if="${exito}" class="mb-8 p-5 bg-emerald-50/80 backdrop-blur-md border border-emerald-100 text-emerald-700 rounded-3xl flex items-center gap-4 animate-fade-in shadow-sm" th:text="${exito}"></div>
        <div th:if="${error}" class="mb-8 p-5 bg-rose-50/80 backdrop-blur-md border border-rose-100 text-rose-700 rounded-3xl flex items-center gap-4 animate-fade-in shadow-sm" th:text="${error}"></div>

        <form th:action="@{/paciente/agendar}" method="post" id="agendarForm" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <input type="hidden" id="idDoctor" name="idDoctor" required>
            <input type="hidden" id="hora" name="hora" required>

            <!-- Step 1: Doctors -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass-card p-8 rounded-[2.5rem] border-white/60 shadow-2xl shadow-blue-900/5">
                    <h2 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-3">
                        <span class="w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-lg">1</span>
                        Seleccionar Especialista
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div th:each="doctor : ${doctores}" 
                             th:onclick="'selectDoctor(this, ' + ${doctor.idDoctor} + ')'"
                             class="doctor-card p-5 bg-white/40 border border-white/80 rounded-3xl cursor-pointer hover:bg-white/60 hover:border-blue-400 hover:shadow-lg hover:shadow-blue-900/5 transition-all flex items-center gap-4 group">
                            <div class="h-14 w-14 rounded-2xl bg-gradient-to-br from-blue-500 to-sky-400 flex items-center justify-center text-white font-black text-xl shadow-md group-hover:scale-110 transition-transform">
                                <span th:text="${#strings.substring(doctor.usuario.nombre, 0, 1)}">D</span>
                            </div>
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-slate-900 truncate" th:text="${doctor.usuario.nombre + ' ' + doctor.usuario.apellidos}">Dr. Nombre</h3>
                                <p class="text-xs font-black text-blue-600 uppercase tracking-widest mt-1" th:text="${doctor.especialidad.nombre}">Especialidad</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Step 2: Time & Date -->
            <div class="lg:col-span-5">
                <div id="step2-section" class="glass-card p-8 rounded-[2.5rem] border-white/60 shadow-2xl shadow-blue-900/5 opacity-40 pointer-events-none transition-all duration-500">
                    <h2 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-3">
                        <span class="w-10 h-10 bg-sky-500 text-white rounded-2xl flex items-center justify-center text-lg">2</span>
                        Fecha y Horario
                    </h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-black text-slate-700 ml-1 mb-3 uppercase tracking-wider">Fecha de Consulta</label>
                            <input type="date" id="fecha" name="fecha" required 
                                   class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-bold text-slate-700">
                        </div>

                        <div>
                            <label class="block text-sm font-black text-slate-700 ml-1 mb-3 uppercase tracking-wider">Horarios Disponibles</label>
                            <div class="grid grid-cols-3 gap-3" id="timeSlots">
                                <button type="button" onclick="selectTime(this, '09:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">09:00</button>
                                <button type="button" onclick="selectTime(this, '10:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">10:00</button>
                                <button type="button" onclick="selectTime(this, '11:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">11:00</button>
                                <button type="button" onclick="selectTime(this, '12:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">12:00</button>
                                <button type="button" onclick="selectTime(this, '13:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">13:00</button>
                                <button type="button" onclick="selectTime(this, '14:00')" class="time-btn py-3 px-2 bg-white/60 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-all">14:00</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-black text-slate-700 ml-1 mb-3 uppercase tracking-wider">Motivo (Opcional)</label>
                            <textarea name="motivoConsulta" rows="3" 
                                      class="w-full px-5 py-4 bg-white/60 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all outline-none font-medium text-slate-700 placeholder:text-slate-400"
                                      placeholder="Explícanos brevemente tu síntoma..."></textarea>
                        </div>
                        
                        <button type="button" onclick="submitForm()" 
                                class="w-full py-5 btn-premium rounded-[1.5rem] text-lg font-black uppercase tracking-widest shadow-xl shadow-blue-200 active:scale-[0.98] transition-all">
                            Confirmar Cita
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script th:inline="javascript">
        function selectDoctor(element, doctorId) {
            document.querySelectorAll('.doctor-card').forEach(card => {
                card.classList.remove('bg-blue-50', 'border-blue-400', 'ring-4', 'ring-blue-100');
                card.classList.add('bg-white/40', 'border-white/80');
            });
            
            element.classList.remove('bg-white/40', 'border-white/80');
            element.classList.add('bg-blue-50', 'border-blue-400', 'ring-4', 'ring-blue-100');
            
            const step2 = document.getElementById('step2-section');
            step2.classList.remove('opacity-40', 'pointer-events-none');
            
            document.getElementById('idDoctor').value = doctorId;
        }

        function selectTime(element, timeStr) {
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600', 'shadow-lg', 'shadow-blue-100');
                btn.classList.add('bg-white/40', 'text-slate-600', 'border-slate-200');
            });

            element.classList.remove('bg-white/40', 'text-slate-600', 'border-slate-200');
            element.classList.add('bg-blue-600', 'text-white', 'border-blue-600', 'shadow-lg', 'shadow-blue-100');

            document.getElementById('hora').value = timeStr;
        }

        function submitForm() {
            if (!document.getElementById('idDoctor').value) {
                alert('Por favor, selecciona un especialista primero.');
                return;
            }
            if (!document.getElementById('fecha').value) {
                alert('Por favor, selecciona una fecha para tu cita.');
                return;
            }
            if (!document.getElementById('hora').value) {
                alert('Por favor, selecciona un horario disponible.');
                return;
            }
            document.getElementById('agendarForm').submit();
        }
    </script>
</body>
</html>
