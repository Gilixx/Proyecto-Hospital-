<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita - HospitalDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6">
    
    <header class="flex justify-between items-center mb-8 max-w-4xl mx-auto">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Agendar Nueva Cita</h1>
            <p class="text-gray-500">Selecciona el especialista y tu horario preferido.</p>
        </div>
        <a href="/logout" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg font-medium hover:bg-red-100 transition-colors">Cerrar Sesión</a>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">1. Seleccionar Doctor</h2>
            <div class="space-y-3">
                <div th:each="doctor : ${doctores}" class="p-4 border border-gray-200 rounded-lg hover:border-blue-500 cursor-pointer transition-colors flex items-center gap-4">
                    <div class="h-12 w-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xl">
                        D
                    </div>
                    <div>
                        <h3 class="font-medium text-gray-900" th:text="${doctor.usuario.nombre + ' ' + doctor.usuario.apellidos}">Dr. Nombre</h3>
                        <p class="text-sm text-gray-500" th:text="${doctor.especialidad.nombre}">Especialidad</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 opacity-50 pointer-events-none">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">2. Escoger Fecha y Hora</h2>
            <p class="text-sm text-gray-500 mb-4">Por favor selecciona un doctor primero para ver su disponibilidad.</p>
            
            <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 text-gray-700">
            
            <div class="grid grid-cols-3 gap-2">
                <button class="py-2 border border-gray-200 rounded text-sm hover:bg-gray-50">09:00 AM</button>
                <button class="py-2 border border-gray-200 rounded text-sm hover:bg-gray-50">10:00 AM</button>
                <button class="py-2 border border-blue-500 bg-blue-50 text-blue-700 rounded text-sm font-medium">11:00 AM</button>
            </div>
            
            <button class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">Confirmar Cita</button>
        </div>

    </main>

</body>
</html>
